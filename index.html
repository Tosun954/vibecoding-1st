<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pick Your Creator — 포트폴리오</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700;900&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      overflow: hidden;
      background: #000;
      font-family: 'Noto Sans KR', sans-serif;
      cursor: url('cursor.png') 16 16, auto;
    }

    /* ===== MAIN SCREEN ===== */
    #main-screen {
      position: relative;
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #1a1a2e;
    }

    #main-bg {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
      display: block;
    }

    #sparkle-canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 2;
      pointer-events: none;
    }

    /* Hotspot areas over the characters in the image */
    .hotspot {
      position: absolute;
      cursor: pointer;
      border-radius: 50%;
      transition: box-shadow 0.3s ease, transform 0.2s ease;
      z-index: 10;
    }

    .hotspot::after {
      content: '';
      position: absolute;
      inset: -4px;
      border-radius: 50%;
      border: 2px solid transparent;
      transition: border-color 0.3s ease;
    }

    /* Astronaut hotspot - positioned over the astronaut in the image */
    #hotspot-astronaut {
      width: 14%;
      height: 28%;
      top: 30%;
      left: 53%;
    }

    /* Melting hotspot - positioned over melting in the image */
    #hotspot-melting {
      width: 16%;
      height: 22%;
      top: 52%;
      left: 40%;
    }

    /* Name labels */
    .hotspot-label {
      position: absolute;
      bottom: -30px;
      left: 50%;
      transform: translateX(-50%);
      color: #fff;
      font-size: 14px;
      font-weight: 700;
      text-shadow: 0 2px 8px rgba(0,0,0,0.8);
      opacity: 0;
      transition: opacity 0.3s ease;
      white-space: nowrap;
      pointer-events: none;
    }

    /* Claw arm overlay */
    #claw-arm {
      position: absolute;
      top: 5%;
      left: 41%;
      width: 12%;
      z-index: 5;
      pointer-events: none;
      transform-origin: top center;
      transition: transform 0.1s ease;
      opacity: 0; /* hidden, the claw is in the bg image */
    }

    /* ===== HOVER EFFECTS ===== */
    #main-screen.machine-hover .hotspot-label {
      opacity: 1;
    }

    /* Claw shake animation */
    @keyframes clawShake {
      0%, 100% { transform: rotate(0deg); }
      20% { transform: rotate(3deg); }
      40% { transform: rotate(-3deg); }
      60% { transform: rotate(2deg); }
      80% { transform: rotate(-2deg); }
    }

    #main-screen.machine-hover #claw-shake-zone {
      animation: clawShake 0.5s ease-in-out infinite;
    }

    /* Invisible claw shake zone overlaying the claw in image */
    #claw-shake-zone {
      position: absolute;
      top: 0%;
      left: 35%;
      width: 22%;
      height: 35%;
      z-index: 3;
      pointer-events: none;
      transform-origin: top center;
    }

    /* Individual hover */
    .hotspot:hover {
      transform: scale(1.02);
    }

    /* ===== OVERLAY PANEL ===== */
    #overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.95);
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.5s ease;
    }

    #overlay.active {
      opacity: 1;
      pointer-events: all;
    }

    #overlay-content {
      display: flex;
      align-items: center;
      gap: 60px;
      max-width: 900px;
      padding: 40px;
      transform: translateY(30px);
      transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1);
    }

    #overlay.active #overlay-content {
      transform: translateY(0);
    }

    /* Character image in overlay */
    #overlay-character {
      width: 280px;
      height: auto;
      filter: drop-shadow(0 0 40px rgba(255, 150, 255, 0.5));
      animation: floatChar 3s ease-in-out infinite;
    }

    @keyframes floatChar {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-15px); }
    }

    /* Claw animation in overlay */
    #overlay-claw {
      position: absolute;
      top: -80px;
      left: 50%;
      transform: translateX(-50%);
      width: 150px;
      opacity: 0;
      animation: clawDrop 1s ease-out forwards;
    }

    @keyframes clawDrop {
      0% { top: -200px; opacity: 0; }
      40% { top: -80px; opacity: 1; }
      60% { top: -60px; }
      100% { top: -80px; opacity: 1; }
    }

    /* Info section */
    #overlay-info {
      color: #fff;
      max-width: 400px;
    }

    #overlay-name {
      font-size: 48px;
      font-weight: 900;
      margin-bottom: 8px;
      background: linear-gradient(135deg, #ff9ec7, #c7b3ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    #overlay-role {
      font-size: 18px;
      font-weight: 300;
      color: #b0b0b0;
      margin-bottom: 24px;
      letter-spacing: 2px;
    }

    #overlay-desc {
      font-size: 16px;
      line-height: 1.8;
      color: #d0d0d0;
      font-weight: 300;
    }

    #overlay-desc p {
      margin-bottom: 12px;
    }

    /* Close button */
    #close-btn {
      position: absolute;
      top: 30px;
      right: 40px;
      width: 50px;
      height: 50px;
      border: 2px solid rgba(255,255,255,0.3);
      border-radius: 50%;
      background: none;
      color: #fff;
      font-size: 24px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s ease;
    }

    #close-btn:hover {
      border-color: #ff9ec7;
      color: #ff9ec7;
      transform: rotate(90deg);
    }

    /* Portfolio link button */
    .portfolio-btn {
      display: inline-block;
      margin-top: 24px;
      padding: 12px 32px;
      border: 2px solid #ff9ec7;
      border-radius: 30px;
      color: #ff9ec7;
      text-decoration: none;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 1px;
      transition: all 0.3s ease;
    }

    .portfolio-btn:hover {
      background: #ff9ec7;
      color: #000;
    }

    /* ===== INTRO TITLE ===== */
    #intro-text {
      position: absolute;
      text-align: center;
      z-index: 8;
      pointer-events: none;
    }

    #intro-text h1 {
      font-size: 22px;
      font-weight: 300;
      color: rgba(255, 255, 255, 0.85);
      text-shadow: 0 2px 20px rgba(0,0,0,0.8);
      letter-spacing: 3px;
    }

    #intro-text p {
      font-size: 13px;
      color: rgba(255, 255, 255, 0.5);
      margin-top: 8px;
      letter-spacing: 1px;
    }

    /* Neon glow pulse */
    @keyframes neonGlow {
      0%, 100% {
        text-shadow:
          0 0 7px #fff,
          0 0 15px #ff9ec7,
          0 0 30px #ff9ec7,
          0 0 50px #ff6fb0,
          0 0 80px #ff6fb0;
      }
      50% {
        text-shadow:
          0 0 10px #fff,
          0 0 25px #ff9ec7,
          0 0 50px #ff9ec7,
          0 0 80px #ff6fb0,
          0 0 120px #ff6fb0,
          0 0 160px rgba(255,111,176,0.4);
      }
    }

    @keyframes subtleGlow {
      0%, 100% {
        opacity: 0.6;
        text-shadow:
          0 0 5px #fff,
          0 0 10px #ff9ec7,
          0 0 20px rgba(255,158,199,0.4);
      }
      50% {
        opacity: 1;
        text-shadow:
          0 0 8px #fff,
          0 0 18px #ff9ec7,
          0 0 35px #ff9ec7,
          0 0 55px rgba(255,111,176,0.3);
      }
    }

    #intro-text h1 {
      animation: neonGlow 3s ease-in-out infinite;
    }

    #intro-text p {
      animation: simplePulse 3s ease-in-out infinite;
    }

    @keyframes simplePulse {
      0%, 100% { opacity: 0.5; }
      50% { opacity: 1; }
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 768px) {
      #main-screen {
        background: #a8d4d7;
      }

      #main-bg {
        object-fit: contain;
      }

      #overlay-content {
        flex-direction: column;
        text-align: center;
        gap: 20px;
        padding: 20px;
      }

      #overlay-character {
        width: 160px;
      }

      #overlay-name {
        font-size: 32px;
      }

      #overlay-role {
        font-size: 14px;
      }

      #overlay-desc {
        font-size: 14px;
      }

      .hotspot-label {
        font-size: 10px;
        bottom: -18px;
      }

      #close-btn {
        top: 20px;
        right: 20px;
        width: 40px;
        height: 40px;
        font-size: 20px;
      }
    }
  </style>
</head>
<body>

  <!-- MAIN SCREEN -->
  <div id="main-screen">
    <canvas id="sparkle-canvas"></canvas>
    <img id="main-bg" src="16.9upscale.png" alt="인형뽑기 기계" />

    <!-- Invisible claw zone for shake animation -->
    <div id="claw-shake-zone"></div>

    <!-- Character hotspots -->
    <div id="hotspot-astronaut" class="hotspot" data-character="astronaut"></div>
    <div id="hotspot-melting" class="hotspot" data-character="melting"></div>

    <!-- Bottom intro text -->
    <div id="intro-text">
      <h1>PICK YOUR CREATOR</h1>
      <p>캐릭터를 선택하세요</p>
    </div>
  </div>

  <!-- OVERLAY PANEL -->
  <div id="overlay">
    <button id="close-btn">&times;</button>
    <div id="overlay-content">
      <div style="position: relative;">
        <img id="overlay-claw" src="mmm2.png" alt="기계손" />
        <img id="overlay-character" src="" alt="" />
      </div>
      <div id="overlay-info">
        <div id="overlay-name"></div>
        <div id="overlay-role"></div>
        <div id="overlay-desc"></div>
      </div>
    </div>
  </div>

  <script>
    // Character data
    const characters = {
      astronaut: {
        name: '우주인',
        role: 'CREATOR',
        image: 'astronaut.png',
        desc: `
          <p>안녕하세요, 저는 <strong>우주인</strong>입니다.</p>
          <p>크리에이터로서 새로운 세계를 탐험하고 창작합니다.
          기획, 디자인, 콘텐츠 제작까지 — 상상을 현실로 만드는 일을 합니다.</p>
          <a href="#" class="portfolio-btn">PORTFOLIO 보기 →</a>
        `
      },
      melting: {
        name: '멜팅',
        role: 'AI VIDEO CREATOR',
        image: 'melting.png',
        desc: `
          <p>안녕하세요, 저는 <strong>멜팅</strong>입니다.</p>
          <p>AI 영상제작자로서 기술과 감성의 경계를 녹여냅니다.
          AI 도구를 활용한 영상 기획·제작·편집을 통해 새로운 시각 경험을 만들어냅니다.</p>
          <a href="#" class="portfolio-btn">PORTFOLIO 보기 →</a>
        `
      }
    };

    const mainScreen = document.getElementById('main-screen');
    const overlay = document.getElementById('overlay');
    const closeBtn = document.getElementById('close-btn');
    const hotspots = document.querySelectorAll('.hotspot');
    const mainBg = document.getElementById('main-bg');

    // Track image dimensions for responsive hotspot positioning
    function updateHotspots() {
      const screenRect = mainScreen.getBoundingClientRect();
      const imgRatio = mainBg.naturalWidth / mainBg.naturalHeight;
      const containerRatio = screenRect.width / screenRect.height;

      let displayW, displayH, offsetX, offsetY;

      if (containerRatio > imgRatio) {
        displayH = screenRect.height;
        displayW = displayH * imgRatio;
        offsetX = (screenRect.width - displayW) / 2;
        offsetY = 0;
      } else {
        displayW = screenRect.width;
        displayH = displayW / imgRatio;
        offsetX = 0;
        offsetY = (screenRect.height - displayH) / 2;
      }

      // Astronaut - center-right upper area
      const astro = document.getElementById('hotspot-astronaut');
      astro.style.left = (offsetX + displayW * 0.48) + 'px';
      astro.style.top = (offsetY + displayH * 0.12) + 'px';
      astro.style.width = (displayW * 0.18) + 'px';
      astro.style.height = (displayH * 0.50) + 'px';

      // Melting - pink bear, center-right lower area
      const melt = document.getElementById('hotspot-melting');
      melt.style.left = (offsetX + displayW * 0.45) + 'px';
      melt.style.top = (offsetY + displayH * 0.55) + 'px';
      melt.style.width = (displayW * 0.22) + 'px';
      melt.style.height = (displayH * 0.35) + 'px';

      // Claw - top left area
      const claw = document.getElementById('claw-shake-zone');
      claw.style.left = (offsetX + displayW * 0.10) + 'px';
      claw.style.top = (offsetY + displayH * 0.0) + 'px';
      claw.style.width = (displayW * 0.22) + 'px';
      claw.style.height = (displayH * 0.35) + 'px';

      // Intro text - positioned near the drop chute, below the claw arm
      const intro = document.getElementById('intro-text');
      const clawCenterX = offsetX + displayW * 0.10 + (displayW * 0.22) / 2;
      const introW = displayW * 0.28;
      const introTop = offsetY + displayH * 0.48;
      intro.style.left = (clawCenterX - introW / 2) + 'px';
      intro.style.top = introTop + 'px';
      intro.style.width = introW + 'px';

      // Scale font size relative to image
      const baseFontH1 = displayW * 0.032;
      const baseFontP = displayW * 0.016;
      intro.querySelector('h1').style.fontSize = Math.max(baseFontH1, 13) + 'px';
      intro.querySelector('p').style.fontSize = Math.max(baseFontP, 9) + 'px';
    }

    // Update on load and resize
    mainBg.addEventListener('load', updateHotspots);
    window.addEventListener('resize', updateHotspots);
    updateHotspots();

    // Preload hover images
    const hoverImages = {
      astronaut: '16.9upscale-1.png',
      melting: '16.9upscale-2.png'
    };
    const defaultBg = '16.9upscale.png';

    // Preload for instant swap
    Object.values(hoverImages).forEach(src => {
      const img = new Image();
      img.src = src;
    });

    // Detect touch device
    const isTouchDevice = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);

    // Hover: swap background image to show neon glow on character (desktop only)
    hotspots.forEach(h => {
      h.addEventListener('mouseenter', () => {
        if (isTouchDevice) return;
        const key = h.dataset.character;
        mainBg.src = hoverImages[key] || defaultBg;
        mainScreen.classList.add('machine-hover');
      });
      h.addEventListener('mouseleave', () => {
        if (isTouchDevice) return;
        mainBg.src = defaultBg;
        mainScreen.classList.remove('machine-hover');
      });
    });

    // Click: open overlay
    function openOverlay(key) {
      const data = characters[key];
      document.getElementById('overlay-character').src = data.image;
      document.getElementById('overlay-character').alt = data.name;
      document.getElementById('overlay-name').textContent = data.name;
      document.getElementById('overlay-role').textContent = data.role;
      document.getElementById('overlay-desc').innerHTML = data.desc;

      const clawImg = document.getElementById('overlay-claw');
      clawImg.style.animation = 'none';
      clawImg.offsetHeight;
      clawImg.style.animation = 'clawDrop 1s ease-out forwards';

      overlay.classList.add('active');
    }

    hotspots.forEach(h => {
      h.addEventListener('click', () => {
        const key = h.dataset.character;

        if (isTouchDevice) {
          // Mobile: show glow image first, then open overlay after 0.5s
          mainBg.src = hoverImages[key] || defaultBg;
          mainScreen.classList.add('machine-hover');
          setTimeout(() => {
            openOverlay(key);
            mainBg.src = defaultBg;
            mainScreen.classList.remove('machine-hover');
          }, 500);
        } else {
          openOverlay(key);
        }
      });
    });

    // Close overlay
    closeBtn.addEventListener('click', () => {
      overlay.classList.remove('active');
    });

    overlay.addEventListener('click', (e) => {
      if (e.target === overlay) {
        overlay.classList.remove('active');
      }
    });

    // ESC key
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') overlay.classList.remove('active');
    });

    // ===== SPARKLE PARTICLES =====
    const canvas = document.getElementById('sparkle-canvas');
    const ctx = canvas.getContext('2d');
    let sparkles = [];
    const isMobile = window.innerWidth <= 768;
    const SPARKLE_COUNT = 70;

    function resizeCanvas() {
      canvas.width = mainScreen.offsetWidth;
      canvas.height = mainScreen.offsetHeight;
    }
    resizeCanvas();
    window.addEventListener('resize', resizeCanvas);

    // Get the mint background region (top area of the image, excluding the pink machine frame)
    function getMintRegion() {
      const screenRect = mainScreen.getBoundingClientRect();
      const imgRatio = mainBg.naturalWidth / mainBg.naturalHeight;
      const containerRatio = screenRect.width / screenRect.height;
      let displayW, displayH, offsetX, offsetY;

      if (containerRatio > imgRatio) {
        displayH = screenRect.height;
        displayW = displayH * imgRatio;
        offsetX = (screenRect.width - displayW) / 2;
        offsetY = 0;
      } else {
        displayW = screenRect.width;
        displayH = displayW / imgRatio;
        offsetX = 0;
        offsetY = (screenRect.height - displayH) / 2;
      }

      // Full image area
      return {
        x: offsetX,
        y: offsetY,
        w: displayW,
        h: displayH,
        // Character exclusion zones (astronaut & melting)
        exclude: [
          { x: offsetX + displayW * 0.48, y: offsetY + displayH * 0.12, w: displayW * 0.18, h: displayH * 0.50 },
          { x: offsetX + displayW * 0.45, y: offsetY + displayH * 0.55, w: displayW * 0.22, h: displayH * 0.35 }
        ]
      };
    }

    function isInExcludeZone(x, y, region) {
      return region.exclude.some(z => x >= z.x && x <= z.x + z.w && y >= z.y && y <= z.y + z.h);
    }

    function randomPosOutsideCharacters(region) {
      let x, y;
      do {
        x = region.x + Math.random() * region.w;
        y = region.y + Math.random() * region.h;
      } while (isInExcludeZone(x, y, region));
      return { x, y };
    }

    function createSparkle() {
      const region = getMintRegion();
      const pos = randomPosOutsideCharacters(region);
      return {
        x: pos.x,
        y: pos.y,
        size: Math.random() * 6 + 3,
        opacity: Math.random(),
        speed: 0.5 / (Math.PI * 2),
        phase: Math.random() * Math.PI * 2,
        drift: (Math.random() - 0.5) * 0.3,
        floatSpeed: Math.random() * 0.3 + 0.1,
        color: ['#ffffff', '#ffe0f0', '#c8faff', '#fff5fc', '#d4f8ff'][Math.floor(Math.random() * 5)]
      };
    }

    // Mobile: slow float upward + twinkle
    function createMobileSparkle() {
      const region = getMintRegion();
      const pos = randomPosOutsideCharacters(region);
      return {
        x: pos.x,
        y: pos.y,
        size: Math.random() * 4 + 2,
        phase: Math.random() * Math.PI * 2,
        cycleSpeed: Math.PI * 2 / 0.5,
        floatSpeed: Math.random() * 0.08 + 0.02,
        drift: (Math.random() - 0.5) * 0.1,
        color: ['#ffffff', '#ffe0f0', '#c8faff', '#fff5fc', '#d4f8ff'][Math.floor(Math.random() * 5)]
      };
    }

    function initSparkles() {
      sparkles = [];
      for (let i = 0; i < SPARKLE_COUNT; i++) {
        sparkles.push(isMobile ? createMobileSparkle() : createSparkle());
      }
    }

    function drawStar(x, y, size, color, opacity) {
      ctx.save();
      ctx.globalAlpha = opacity;
      ctx.fillStyle = color;
      ctx.shadowColor = color;
      ctx.shadowBlur = size * 3;

      // 4-pointed star
      ctx.beginPath();
      const outer = size;
      const inner = size * 0.3;
      for (let i = 0; i < 4; i++) {
        const angle = (i * Math.PI) / 2 - Math.PI / 2;
        const nextAngle = angle + Math.PI / 4;
        ctx.lineTo(x + Math.cos(angle) * outer, y + Math.sin(angle) * outer);
        ctx.lineTo(x + Math.cos(nextAngle) * inner, y + Math.sin(nextAngle) * inner);
      }
      ctx.closePath();
      ctx.fill();
      ctx.restore();
    }

    let time = 0;
    function animateSparkles() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      time += 0.016;

      if (isMobile) {
        // Mobile: slow float upward + twinkle
        const region = getMintRegion();
        sparkles.forEach(s => {
          const opacity = (Math.sin(time * s.cycleSpeed + s.phase) + 1) / 2 * 0.7 + 0.1;

          s.y -= s.floatSpeed;
          s.x += s.drift * 0.1;

          if (s.y < region.y - 10 || s.x < region.x - 10 || s.x > region.x + region.w + 10 || isInExcludeZone(s.x, s.y, region)) {
            const pos = randomPosOutsideCharacters(region);
            s.x = pos.x;
            s.y = region.y + region.h;
            s.phase = Math.random() * Math.PI * 2;
          }

          drawStar(s.x, s.y, s.size, s.color, opacity);
        });
      } else {
        // Desktop: original floating behavior
        const region = getMintRegion();
        sparkles.forEach(s => {
          const twinkle = (Math.sin(time * (1 / s.speed) + s.phase) + 1) / 2;
          const currentOpacity = twinkle * 0.8 + 0.1;

          s.y -= s.floatSpeed;
          s.x += s.drift * 0.1;

          if (s.y < region.y - 10 || s.x < region.x - 10 || s.x > region.x + region.w + 10 || isInExcludeZone(s.x, s.y, region)) {
            const pos = randomPosOutsideCharacters(region);
            s.x = pos.x;
            s.y = region.y + region.h;
            s.phase = Math.random() * Math.PI * 2;
          }

          const currentSize = s.size * (0.7 + twinkle * 0.5);
          drawStar(s.x, s.y, currentSize, s.color, currentOpacity);
        });
      }

      requestAnimationFrame(animateSparkles);
    }

    // Start after image loads — only once
    let sparklesStarted = false;
    function startSparkles() {
      if (sparklesStarted) return;
      sparklesStarted = true;
      initSparkles();
      animateSparkles();
    }

    if (mainBg.complete) {
      startSparkles();
    } else {
      mainBg.addEventListener('load', startSparkles);
    }
  </script>
</body>
</html>
